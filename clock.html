        equationPlain,
        newsCount: usedCount,
        fallbackWindow: fallback.window,
        tp1: 0.003, tp2: 0.006, tp3: 0.009,
      };
    }
    const signal = applied.finalDirection === "buy" ? "BUY" : "SELL";
    return {
      signal,
      chargeFlip: applied.chargeFlip,
      mode: modeLabel,
      regime: regimeLabel,
      flip: false,
      reason: applied.reason,
      clusterResult: applied.clusterResult,
      sellRestriction: applied.sellRestriction,
      activeEvents: applied.activeEvents || activeEvents,
      activeCount: applied.activeCount,
      uniqueNewsCount: usedCount,
      negativePressure: applied.negativePressure,
      positivePressure: applied.positivePressure,
      baseDirection: fallback.direction,
      baseCharge: fallback.direction === "buy" ? 1 : -1,
      finalCharge: applied.finalCharge,
      newsFlip: applied.newsFlip,
      slotPolarity: regimePolarity,
      slotSign: applied.slotSign || fallback.sign,
      newsSign: applied.newsSign,
      equation: equationPlain,
      equationPlain,
      newsCount: usedCount,
      fallbackWindow: fallback.window,
      tp1: 0.003, tp2: 0.006, tp3: 0.009,
    };
  }

  // ── WIN/LOSS SCORING — updated replay exit/extension ladder ────────────────
  // Breaking burst starts at 0.15%; calendar TP levels are 0.3 / 0.6 / 0.9 and the replay ladder also tracks 0.25 / 0.4 / 1.2 extensions.
  function getSignalWindow(activeEvents){
    const list = Array.isArray(activeEvents) ? activeEvents : [];
    if(!list.length){
      return { type:"fallback", stars:0, windowMins:30, tp:0.003, tpLabel:"TP1", tpPct:"0.3%", exitRule:"fallback timing window" };
    }
    const breaking = list.filter(ev=>replayEventType(ev)==="breaking");
    const calendar = list.filter(ev=>replayEventType(ev)!=="breaking");
    // Calendar wins first. Breaking is only used when no calendar event is active.
    if(calendar.length){
      const maxStars = Math.max(...calendar.map(ev=>Math.max(1,Math.min(3,Number(ev.stars||1)))));
      if(maxStars===3) return { type:"star", stars:3, windowMins:75, tp:0.009, tpLabel:"TP3", tpPct:"0.9%", exitRule:"⭐⭐⭐ ±75m symmetric window" };
      if(maxStars===2) return { type:"star", stars:2, windowMins:45, tp:0.006, tpLabel:"TP2", tpPct:"0.6%", exitRule:"⭐⭐ ±45m symmetric window" };
      return             { type:"star", stars:1, windowMins:15, tp:0.003, tpLabel:"TP1", tpPct:"0.3%", exitRule:"⭐ ±15m symmetric window" };
    }
    if(breaking.length){
      return { type:"break", stars:0, windowMins:15, tp:0.0015, tpLabel:"BURST", tpPct:"0.15%", exitRule:"breaking 0-15m burst / 61.8-78.6" };
    }
    return { type:"fallback", stars:0, windowMins:30, tp:0.003, tpLabel:"TP1", tpPct:"0.3%", exitRule:"fallback timing window" };
  }

  // ── WIN/LOSS SCORER — uses signal's own window as the exit, not full 1H candle ─
  // A WIN = price moved the required % in the right direction before the window expired
  // Uses 5m candles across the full signal window. Wicks can locate risk; closes confirm direction.
  function rpScore(signal, openPrice, highPrice, lowPrice, sigWindow){
    if(!openPrice) return null;
    const w = sigWindow || getSignalWindow([]);
    const { tp, tpLabel, tpPct, exitRule } = w;
    if(signal==="BUY"){
      const target = openPrice*(1+tp);
      const hit = highPrice >= target;
      return {
        correct: hit, tp1Hit: hit,
        label:  hit ? `${tpLabel} (${tpPct})` : "MISS",
        detail: hit
          ? `+${tpPct} hit — exit at ${tpLabel} per ${exitRule}`
          : `Needed +${tpPct} before ${exitRule} — price only reached +${(((highPrice/openPrice)-1)*100).toFixed(2)}%`,
        windowLabel: exitRule, tp, tpLabel, tpPct,
      };
    }
    if(signal==="SELL"){
      const target = openPrice*(1-tp);
      const hit = lowPrice <= target;
      return {
        correct: hit, tp1Hit: hit,
        label:  hit ? `${tpLabel} (${tpPct})` : "MISS",
        detail: hit
          ? `-${tpPct} hit — exit at ${tpLabel} per ${exitRule}`
          : `Needed -${tpPct} before ${exitRule} — price only dropped -${(((openPrice/lowPrice)-1)*100).toFixed(2)}%`,
        windowLabel: exitRule, tp, tpLabel, tpPct,
      };
    }
    return null;
  }

  function replayNumberFingerprint(raw){
    return (String(raw||"").match(/\$?\d+(?:\.\d+)?%?|\d{1,3}(?:,\d{3})+/g)||[]).join("|");
  }

  function dedupeReplayEventsExact(items){
    const seen = new Set();
    return (items||[]).filter(Boolean).filter(ev=>{
      const text = `${ev?.title||ev?.l||ev?.label||ev?.headline||""} ${ev?.desc||ev?.note||""}`;
      if(!String(text).trim()) return false;
      const pubMs = Date.parse(ev?.pub||ev?.date||0);
      const bucket = pubMs && !Number.isNaN(pubMs) ? Math.floor(pubMs/(3*60000)) : "na";
      const key = [
        replayEventType(ev),
        canonicalNewsText(text),
        replayNumberFingerprint(text),
        bucket
      ].join("|");
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  async function fetchJsonReplay(url){
    const urls = [url, "https://api.allorigins.win/raw?url="+encodeURIComponent(url), "https://corsproxy.io/?"+encodeURIComponent(url)];
    for(const u of urls){
      try{
        const r = await fetch(u,{cache:"no-cache"});
        if(!r.ok) continue;
        const txt = await r.text();
        return JSON.parse(txt);
      }catch(e){}
    }
    return null;
  }

  async function fetchReplayDirectEvents(){
    const out = [];

    const newsUrls = [...new Set((NEWS_FEEDS||[]).flatMap(f=>f.urls||[]))];
    const newsGroups = await Promise.all(newsUrls.map(url=>{
      let src = /reuters/i.test(url) ? "Reuters Markets" : /bloomberg/i.test(url) ? "Bloomberg Markets" : "Google News";
      return fetchRSS(url).then(items=>(items||[]).map(item=>{
        const norm = normalizeItem(item, src, /bloomberg/i.test(url)?"#f0a030":"#ff6b35");
        const cls = classifyEcoArticle(norm.title, norm.desc);
        return {
          ...norm,
          ...cls,
          polarity: cls.bearish ? -1 : cls.bullish ? 1 : 0,
          kind:/powell|speech|remarks|testimony|presser|press conference/i.test(norm.title||"")?"speech":"breaking",
          feedType:"news",
          country:norm.country||inferCountryCode(`${norm.title} ${norm.desc}`),
          rateValue:getRateForSymbol(norm.country||inferCountryCode(`${norm.title} ${norm.desc}`)),
        };
      })).catch(()=>[]);
    }));
    out.push(...newsGroups.flat());

    const ffFeed = (CALENDAR_FEEDS||[]).find(f=>f.type==="ff_json");
    if(ffFeed){
      const rows = await fetchJsonReplay(ffFeed.url);
      if(Array.isArray(rows)){
        rows.forEach(row=>{
          const title = String(row.title || row.event || row.name || "").trim();
          if(!title) return;
          const currency = String(row.country || row.currency || row.ccy || inferCountryCode(title) || "").toUpperCase().slice(0,3);
          const impactRaw = String(row.impact || row.impact_title || row.impactTitle || row.impactName || row.level || "").toLowerCase();
          let stars = Number(row.stars || row.impactNum || row.impact_num || 0);
          if(!stars) stars = /high|holiday|red/.test(impactRaw) ? 3 : /medium|med|orange|yellow/.test(impactRaw) ? 2 : 1;
          stars = Math.max(1, Math.min(3, stars));
          const date = String(row.date || row.day || row.datetime || "").trim();
          const time = String(row.time || row.event_time || "").trim();
          let pub = String(row.pub || row.timestamp || row.datetime || "").trim();
          if(pub && /^\d{10}$/.test(pub)) pub = new Date(Number(pub)*1000).toISOString();
          if(!Date.parse(pub)) pub = Date.parse(date) ? date : ((date && time) ? `${date} ${time} GMT-0400` : date);
          out.push({
            title,
            desc: String(row.actual || row.forecast || row.previous || "").trim(),
            source: ffFeed.label,
            color: ffFeed.color,
            country: currency,
            currency,
            stars,
            pub,
            kind:/powell|speech|remarks|testimony|presser|press conference/i.test(title)?"speech":"event",
            feedType:"calendar",
            polarity:0,
            rateValue:getRateForSymbol(currency),
          });
        });
      }
    }

    const calGroups = await Promise.all((CALENDAR_FEEDS||[]).filter(f=>f.type==="rss").map(feed=>
      fetchRSS(feed.url).then(items=>(items||[]).map(item=>{
        const norm = normalizeItem(item, feed.label, feed.color);
        const cls = classifyEcoArticle(norm.title, norm.desc);
        const stars = Math.max(1, cls.stars || calStars(norm.title) || 1);
        return {
          ...norm,
          ...cls,
          stars,
          kind:/powell|speech|remarks|testimony|presser|press conference/i.test(norm.title||"")?"speech":"event",
          feedType:"calendar",
          polarity: cls.bearish ? -1 : cls.bullish ? 1 : 0,
          rateValue:getRateForSymbol(norm.country || inferCountryCode(`${norm.title} ${norm.desc}`)),
        };
      })).catch(()=>[])
    ));
    out.push(...calGroups.flat());

    return dedupeReplayEventsExact(out).filter(ev=>{
      const t = Date.parse(ev.pub||0);
      if(!t || Number.isNaN(t)) return false;
      if(isJunkTickerOnlyHeadline(ev.title||"")) return false;
      if(/(WHITE SOX|TIGERS|YANKEES|METS|DODGERS|LAKERS|CELTICS|NFL|NBA|MLB|NHL|SOCCER|FOOTBALL|BASEBALL|HOMERS?|GAME|MATCH|VS\.?|BEAT|WIN OVER)/i.test(String(ev.title||""))) return false;
      return true;
    });
  }

  function rpActiveEventsFor(tsMs, eventsPool){
    const pool = eventsPool || loggedLastWeek;
    const active = pool.filter(ev=>{
      if(isJunkTickerOnlyHeadline(ev?.title||ev?.l||ev?.label||ev?.headline||"")) return false;
      if(/\b(WHITE SOX|TIGERS|YANKEES|METS|DODGERS|LAKERS|CELTICS|NFL|NBA|MLB|NHL|SOCCER|FOOTBALL|BASEBALL|HOMERS?|GAME|MATCH|VS\.?|BEAT|WIN OVER)\b/i.test(String(ev?.title||ev?.l||ev?.label||ev?.headline||""))) return false;
      const t=Date.parse(ev.pub||0); if(!t||Number.isNaN(t))return false;
      const w=eventWindowMinutes(ev);
      return tsMs>=(t-w.pre*60000)&&tsMs<=(t+w.post*60000);
    }).map(ev=>{
      // Re-classify polarity on-the-fly using current keyword list
      if(Number(ev.polarity)!==0) return ev;
      const txt = (ev.title||ev.l||"")+" "+(ev.desc||"");
      const cls = classifyEcoArticle(txt, "");
      const freshPol = cls.bearish ? -1 : cls.bullish ? 1 : 0;
      return freshPol !== 0 ? {...ev, polarity: freshPol} : ev;
    });

    const byNearTime = (a,b)=>Math.abs((Date.parse(a.pub||0)||0)-tsMs)-Math.abs((Date.parse(b.pub||0)||0)-tsMs);
    const calendar = active.filter(ev=>replayEventType(ev)!=="breaking").sort(byNearTime);
    const breaking = active.filter(ev=>replayEventType(ev)==="breaking").sort(byNearTime);

    // Priority rule: calendar first, then Reuters/Bloomberg breaking, then fallback.
    // Breaking never mixes with Myfxbook/TradingEconomics/economic-calendar events.
    // Grade max two active event blocks to avoid cluster-on-cluster replay.
    if(calendar.length) return calendar.slice(0,2);
    if(breaking.length) return breaking.slice(0,2);
    return [];
  }

  async function runReplay(){
    setRpLoading(true); setRpError(""); setRpResults(null); setRpPlayIdx(0); setRpPlaying(false); setRpEnded(false);
    try {
      const withOverallTimeout=(promise,ms=6500,fallback=[])=>Promise.race([promise,new Promise(resolve=>setTimeout(()=>resolve(fallback),ms))]);
      const candles = await rpFetchCandles(rpDaysBack);
      const freshReplayEvents = await withOverallTimeout(fetchReplayDirectEvents().catch(()=>[]), 6500, []);

      // CLEAN TIMELINE V2: keep the original engine behavior, but feed it ALL
      // relevant market-moving events instead of breaking-only news. Calendar events
      // are kept if their symmetric window can overlap the replay candle range.
      const replayWindowStart = Date.now() - rpDaysBack*24*60*60*1000;
      const replayWindowEnd = Date.now() + 90*60000;
      const replayEventPool = dedupeReplayEventsExact([...(loggedLastWeek||[]), ...(freshReplayEvents||[]), ...(replayEvents||[])]);
      const replayNewsEvents = replayEventPool.filter(ev=>{
        const t = Date.parse(ev.pub||0);
        if(!t || Number.isNaN(t)) return false;
        const w = eventWindowMinutes(ev);
        return (t + w.post*60000) >= replayWindowStart && (t - w.pre*60000) <= replayWindowEnd;
      });
      // ── PRIORITY REPLAY ─────────────────────────────────────────────────────────────
      // Calendar/news windows always qualify. If no news is active, fallback only
      // checks Derrick's listed timing slots so replay stays smooth and not over-traded.
      const FALLBACK_TIMES = new Set([0,30,60,90,120,180,210,240,270,300,360,390,420,450,480,540,570,600,630,660,720,750,780,810,840,900,930,960,990,1020,1080,1110,1140,1170,1200,1260,1290,1320,1350,1380]);
      function isReplaySlot(h24, m, hasNews=false){ return hasNews || FALLBACK_TIMES.has(h24*60+m); }
      function isExecHour(h24, m){  return false; }

      // ── CANDLE LOOKUP ─────────────────────────────────────────────────────
      const candleByTs = {};
      for(const c of candles) candleByTs[c.ts] = c;
      const sortedTs = candles.map(c=>c.ts).sort((a,b)=>a-b);

      function getNextCandle(ts){
        const idx = sortedTs.indexOf(ts);
        if(idx<0||idx>=sortedTs.length-1) return null;
        return candleByTs[sortedTs[idx+1]]||null;
      }

      // ── SCORER — updated replay extension ladder ─────────────────────────────
      const RP_TP_LEVELS = [
        { key:"015",  label:"0.15%", value:0.0015 },
        { key:"030",  label:"0.3%",  value:0.003  },
        { key:"060",  label:"0.6%",  value:0.006  },
        { key:"090",  label:"0.9%",  value:0.009  },
      ];

      function rpScore2(signal, c1, sigWindow, eventsPool=[], entryEvents=[]){
        if(!c1||!c1.open) return null;
        const {exitRule, tp: exitTP, tpLabel, tpPct, windowMins=15} = sigWindow;
        const entryTs = Number(c1.ts);
        const maxHoldMs = Math.max(15, Number(windowMins)||15)*60000;
        const entryKeys = new Set((entryEvents||[]).map(ev=>`${sameTopicKey(`${ev?.title||ev?.l||ev?.label||ev?.headline||""} ${ev?.desc||""} ${ev?.note||""}`)}|${replayEventType(ev)}`));
        const nextInterrupt = (eventsPool||[])
          .map(ev=>({ev, t:Date.parse(ev.pub||0)}))
          .filter(x=>x.t && !Number.isNaN(x.t) && x.t>entryTs && x.t<=entryTs+maxHoldMs)
          .filter(x=>!entryKeys.has(`${sameTopicKey(`${x.ev?.title||x.ev?.l||x.ev?.label||x.ev?.headline||""} ${x.ev?.desc||""} ${x.ev?.note||""}`)}|${replayEventType(x.ev)}`))
          .sort((a,b)=>a.t-b.t)[0];
        const deadline = Math.min(entryTs + maxHoldMs, nextInterrupt ? nextInterrupt.t : entryTs + maxHoldMs);
        const forwardTs = sortedTs.filter(t=>t>=entryTs && t<=deadline);
        const candlesToCheck = forwardTs.map(t=>candleByTs[t]).filter(Boolean);
        if(!candlesToCheck.length) candlesToCheck.push(c1);
        const lastC = candlesToCheck[candlesToCheck.length-1] || c1;
        let bestHigh = c1.high, bestLow = c1.low;
        for(const c of candlesToCheck){ bestHigh=Math.max(bestHigh,c.high); bestLow=Math.min(bestLow,c.low); }
        const hits = signal==="BUY"
          ? Object.fromEntries(RP_TP_LEVELS.map(l=>["hit"+l.key, bestHigh >= c1.open*(1+l.value)]))
          : Object.fromEntries(RP_TP_LEVELS.map(l=>["hit"+l.key, bestLow <= c1.open*(1-l.value)]));
        const closeCorrect = signal==="BUY" ? lastC.close > c1.open : signal==="SELL" ? lastC.close < c1.open : false;
        const movePct = signal==="BUY"
          ? (((lastC.close/c1.open)-1)*100).toFixed(2)
          : (((c1.open/lastC.close)-1)*100).toFixed(2);
        const maxPct = signal==="BUY"
          ? (((bestHigh/c1.open)-1)*100).toFixed(2)
          : (((c1.open/bestLow)-1)*100).toFixed(2);
        const interrupted = !!nextInterrupt;
        const interruptLabel = interrupted ? ` · interrupted by ${String(nextInterrupt.ev?.title||'news').slice(0,44)}` : "";
        return {
          correct: closeCorrect,
          tp1Hit: !!hits.hit030,
          ...hits,
          label: closeCorrect ? "WINDOW CLOSE WIN" : "WINDOW CLOSE LOSS",
          detail: `${signal} ${closeCorrect?"held":"failed"} by window close. Close move ${movePct}% · max extension ${maxPct}% · target label ${tpLabel} ${tpPct}${interruptLabel}`,
          windowLabel: exitRule,
          tp: exitTP, tpPct, tpLabel
        };
      }

      const replaySlotLabelFor = (events)=>{
        const list = Array.isArray(events) ? events : [];
        if(!list.length) return "FALLBACK";
        const hasBreak = list.some(ev=>replayEventType(ev)==="breaking");
        const hasCal = list.some(ev=>replayEventType(ev)!=="breaking");
        // rpActiveEventsFor already enforces calendar > breaking, never mixed.
        if(hasCal) return "CALENDAR";
        if(hasBreak) return "BREAKING";
        return "FALLBACK";
      };

      function floorTo3(ts){ return Math.floor(ts/(3*60000))*3*60000; }
      function newsEntryTs(ev){
        const t = Date.parse(ev?.pub||0); if(!t||Number.isNaN(t)) return 0;
        const w = eventWindowMinutes(ev);
        return floorTo3(t - w.pre*60000);
      }
      function isNewsEntrySlot(ts, events){
        const list = Array.isArray(events) ? events : [];
        return list.some(ev=>Math.abs(Number(ts)-newsEntryTs(ev)) < 90000);
      }
      function upcomingInterruptTs(ts, eventsPool){
        const candidates = [];
        // next fallback/hour/switch table time
        for(const mins of FALLBACK_TIMES){
          const et = rpGetETParts(ts);
          const dayStart = ts - ((et.h24*60+et.m)*60000);
          let t = dayStart + mins*60000;
          if(t <= ts) t += 24*60*60000;
          candidates.push(t);
        }
        (eventsPool||[]).forEach(ev=>{
          const ent = newsEntryTs(ev);
          if(ent>ts) candidates.push(ent);
        });
        return candidates.filter(x=>x>ts).sort((a,b)=>a-b)[0] || (ts+60*60000);
      }
      function hasFallbackSpace(ts, eventsPool){
        return (upcomingInterruptTs(ts, eventsPool) - ts) >= 15*60000;
      }

      // ── BUILD SESSIONS — clean hours only ─────────────────────────────────
      const sessions = [];
      for(const c of candles){
        const et = rpGetETParts(c.ts);
        const activeEvents = rpActiveEventsFor(c.ts, replayNewsEvents);
        const hasNews = activeEvents.length > 0;
        // No 3-minute overtrading: news trades only at their calculated window entry candle.
        // Fallback trades only at Derrick table times, only when 15m+ space exists.
        if(hasNews){
          if(!isNewsEntrySlot(c.ts, activeEvents)) continue;
        } else {
          if(!FALLBACK_TIMES.has(et.h24*60+et.m)) continue;
          if(!hasFallbackSpace(c.ts, replayNewsEvents)) continue;
        }
        const isExec = false;
        const slotLabel = replaySlotLabelFor(activeEvents);

        const sigWindow = getSignalWindow(activeEvents);
        const replay = rpSignal(et.h24, et.m, activeEvents);
        const nextC = getNextCandle(c.ts);
        const score = rpScore2(replay.signal, c, sigWindow, replayNewsEvents, activeEvents);

        if(!replay.signal) continue;

        const quality = hasNews ? (activeEvents.some(ev=>replayEventType(ev)!=="breaking") ? "CALENDAR" : "BREAKING") : "FALLBACK";

        sessions.push({
          ts: c.ts, h24: et.h24, m: et.m,
          dayStr: et.dayStr, timeStr: et.timeStr,
          open: Math.round(c.open), close: Math.round(c.close),
          high: Math.round(c.high), low: Math.round(c.low),
          isExecute: isExec, isTrap: slotLabel==="TRAP", hasNews, quality,
          slotType: slotLabel,
          sigWindow, ...replay, score,
        });
      }

      const newsSessions = sessions; // includes calendar, macro breaking, and fallback timing setups
      const scoredRows = newsSessions.filter(s=>typeof s.score?.correct==="boolean");
      const wins   = scoredRows.filter(s=>s.score.correct===true).length;
      const losses = scoredRows.filter(s=>s.score.correct===false).length;
      const total  = wins+losses;
      const wr     = total>0 ? Math.round((wins/total)*100) : 0;

      // Multi-level TP hit tracking per updated eight-level ladder
      const tpStats = Object.fromEntries(RP_TP_LEVELS.map(l=>{
        const wins = scoredRows.filter(s=>s.score?.["hit"+l.key]===true).length;
        return [l.key, { wins, wr: total>0 ? Math.round((wins/total)*100) : 0, label:l.label }];
      }));
      const wr015 = tpStats["015"]?.wr || 0, wr025 = tpStats["025"]?.wr || 0, wr030 = tpStats["030"]?.wr || 0,
            wr040 = tpStats["040"]?.wr || 0, wr060 = tpStats["060"]?.wr || 0, wr090 = tpStats["090"]?.wr || 0, wr120 = tpStats["120"]?.wr || 0;
      // Legacy aliases stay mapped to clean ladder values only, so no tiny old levels display.
      const wr003 = wr015, wr006 = wr025, wr009 = wr030, wr012 = wr040;
      const wins618 = tpStats["015"]?.wins || 0; const wins100 = tpStats["030"]?.wins || 0;
      const wr618 = wr015; const wr100 = wr030;

      // 4-way breakdown
      const wr4 = (label)=>{
        const rows = scoredRows.filter(s=>s.quality===label);
        return rows.length ? {
          wr: Math.round((rows.filter(s=>s.score.correct).length/rows.length)*100),
          n: rows.length
        } : null;
      };

      const breakdown = {
        primary: wr4("CALENDAR") || wr4("BREAKING") || wr4("FALLBACK"),
        calendar: wr4("CALENDAR"),
        breaking: wr4("BREAKING"),
        fallback: wr4("FALLBACK"),
      };
      breakdown.breakingOnly = breakdown.primary; // backwards compatible display key

      const candleNote = candles.length >= 420 ? "3m candles" 
        : candles.length >= 180 ? "3m limited" 
        : candles.length >= 80  ? "3m/backup candles" 
        : "limited candles — re-run for better data";

      // ── WEEK REGIME — BTC % change over the replay window ─────────────────
      // Tells you if this was a trend week, crash week, or choppy week
      const sortedCandles = [...candles].sort((a,b)=>a.ts-b.ts);
      const firstC = sortedCandles[0];
      const lastC  = sortedCandles[sortedCandles.length-1];
      const weekPct = (firstC&&lastC&&firstC.close>0)
        ? (((lastC.close - firstC.close)/firstC.close)*100)
        : null;
      const weekRegime = weekPct === null ? "unknown"
        : weekPct <= -10 ? "CRASH"
        : weekPct <= -3  ? "DOWNTREND"
        : weekPct >= 10  ? "RALLY"
        : weekPct >= 3   ? "UPTREND"
        : "CHOPPY";
      const weekRegimeCol = weekRegime==="CRASH"||weekRegime==="DOWNTREND" ? R
        : weekRegime==="RALLY"||weekRegime==="UPTREND" ? G : A;

      if(!sessions.length) setRpError("No replay candles loaded. Check internet connection and re-run.");
      setRpResults({
        newsSessions, wins, losses, total, wr,
        tpStats, wr015, wr025, wr030, wr040, wr060, wr090, wr120, wr003, wr006, wr009, wr012,
        wr618, wr100, newsFilter: rpNewsFilter,
        eventsUsed: replayNewsEvents.length,

            {!ecoLoading&&ecoArticles.filter(a=>a.stars>=(ecoStarFilter||1)).length===0&&(

        {/* ── MIXED FEED (events + breaking news together) ── */}

                  ...item,
                  kind:"event",
                  isUnified:true,
                  pub: item.pub || ((item.date&&item.time)? `${item.date}T${String(item.time).replace(/\s/g,"")}` : ""),

                country: item.country || inferCountryCode(`${item.title||""} ${item.desc||""}`),
                feedType:"breaking"

              // LIVE → UPCOMING → PAST bucketing
              const nowMs = Date.now();
              const classify = (item) => {
                const t = Date.parse(item.pub||0)||0;
                if(!t) return "past";
                if(item.feedType==="breaking"){ const age=nowMs-t; return age>=0&&age<=20*60*1000?"live":"past"; }
                const stars=Math.max(1,Math.min(3,Number(item.stars||1)));
                const winMs=(stars===3?80:stars===2?50:20)*60*1000;
                if(t>nowMs) return "upcoming";
                if(nowMs-t<=winMs) return "live";
                return "past";
              };
              const manualTimeline = (replayEvents||[]).map(item=>({
                ...item,
                isUnified:true,
                pub:item.pub||"",
                country:item.country || inferCountryCode(`${item.title||""} ${item.note||item.desc||""}`, item.country||""),

                desc:item.note||item.desc||"",

              const allMerged = dedupeFeedItems([...calendarTimeline, ...breakingTimeline, ...manualTimeline]);
              const liveBucket     = allMerged.filter(i=>classify(i)==="live").sort((a,b)=>Date.parse(a.pub)-Date.parse(b.pub));
              const upcomingBucket = allMerged.filter(i=>classify(i)==="upcoming").sort((a,b)=>Date.parse(a.pub)-Date.parse(b.pub));
              const pastBucket     = allMerged.filter(i=>classify(i)==="past").sort((a,b)=>Date.parse(b.pub)-Date.parse(a.pub));
              const sectioned = [
                ...liveBucket.map(i=>({...i,_b:"live"})),
                ...upcomingBucket.map(i=>({...i,_b:"upcoming"})),
                ...pastBucket.map(i=>({...i,_b:"past"})),

                return <div style={{textAlign:"center",padding:"24px",color:"#777",fontFamily:"'Share Tech Mono',monospace",fontSize:13}}>No breaking-news events yet — tap refresh.</div>;

              let lastB = null;
              return sectioned.map((item,i)=>{
                const bChanged = item._b!==lastB; lastB=item._b;
                const bm = bMeta[item._b];
                const isLive = item._b==="live"; const isUp = item._b==="upcoming";
                return (
                  <React.Fragment key={i}>
                    {bChanged&&(<div style={{display:"flex",alignItems:"center",gap:8,margin:"12px 0 8px",opacity:0.85}}>
                      <div style={{flex:1,height:1,background:bm.col+"44"}}/>
                      <span style={{fontSize:10,color:bm.col,fontWeight:900,letterSpacing:2,fontFamily:"'Share Tech Mono',monospace"}}>{bm.label}</span>
                      <div style={{flex:1,height:1,background:bm.col+"44"}}/>
                    </div>)}

                      onClick={()=>{ if(item.link) window.open(item.link,"_blank","noopener,noreferrer"); }}
                      style={{
                        background:isLive?`${G}0d`:isUp?`${A}07`:"rgba(255,255,255,0.02)",
                        border:`1px solid ${isLive?G+"44":isUp?A+"33":"rgba(255,255,255,0.07)"}`,
                        borderRadius:12,padding:"12px 14px",marginBottom:8,
                        cursor:item.link?"pointer":"default",position:"relative",overflow:"hidden",
                        opacity:item._b==="past"?0.7:1,
                      }}>
                      <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:isLive?G:isUp?A:(item.color||"#555")}}/>
                      <div style={{paddingLeft:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,gap:8,flexWrap:"wrap"}}>
                          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                            <span style={{fontSize:13,color:isLive?G:isUp?A:(item.color||"#888"),fontWeight:700,letterSpacing:1}}>{item.feedType==="calendar"?"📅 CALENDAR":"⚡ BREAKING"}</span>
                            <span style={{fontSize:13,color:"#aaa",fontWeight:700,letterSpacing:1}}>{item.source}</span>
                            {!!item.country&&<span style={{fontSize:12,color:"#111",background:"rgba(240,160,48,0.25)",border:`1px solid rgba(240,160,48,0.35)`,padding:"1px 6px",borderRadius:8,fontWeight:700}}>{item.country}</span>}
                            {item.feedType==="calendar"&&<span style={{fontSize:12,color:"#f0a030",fontWeight:700}}>{"★".repeat(Math.max(1,Math.min(3,Number(item.stars||1))))}</span>}
                          </div>
                          <span style={{fontSize:13,color:"#bbb",fontFamily:"'Share Tech Mono',monospace"}}>{fmtDate(item.pub)}</span>
                        </div>
                        <div style={{fontSize:13,fontWeight:700,color:isLive?G:isUp?"#ffe":"#ddd",lineHeight:1.45,marginBottom:item.desc?5:0}}>{item.title}</div>
                        {item.desc&&<div style={{fontSize:13,color:"#999",fontFamily:"'Share Tech Mono',monospace",lineHeight:1.6}}>{item.desc.slice(0,160)}{item.desc.length>160?"...":""}</div>}
                        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginTop:6}}>
                          {item.feedType==="calendar"&&<span style={{fontSize:12,color:isLive?G+"cc":isUp?A+"cc":"#556",fontFamily:"'Share Tech Mono',monospace"}}>SHOWS {calendarAdvanceMinutes(item)}m EARLY · SYMMETRIC ±{Number(item.stars||1)===3?75:Number(item.stars||1)===2?45:15}m · TARGET {Number(item.stars||1)===3?"TP3 261 · 0.9%":Number(item.stars||1)===2?"TP2 161 · 0.6%":"TP1 100 · 0.3%"}</span>}
                          {item.feedType!=="calendar"&&<span style={{fontSize:12,color:"#8aa",fontFamily:"'Share Tech Mono',monospace"}}>MACRO BURST 0–15m · 61.8–78.6 · 0.15%</span>}
                        </div>
                      </div>
                    </div>
                  </React.Fragment>
                );
              });
            })()}

{newsView==="news"&&(

            {/* Source selector */}

                  {art.desc&&<div style={{fontSize:13,color:"#999",fontFamily:"'Share Tech Mono',monospace",lineHeight:1.6}}>{art.desc.slice(0,160)}{art.desc.length>160?"...":""}</div>}

        {/* ── ECONOMIC EVENTS ── */}
        {newsView==="calendar"&&(<div style={{padding:"18px",color:"#888",fontFamily:"'Share Tech Mono',monospace"}}>Economic calendar view is active in this build. Calendar events show 30m early for 1★, 60m early for 2★, and 90m early for 3★, then stay alive for their symmetric reaction window.</div>)}


        {/* ── SOURCES ── */}
        {newsView==="links"&&(
          <>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
              <div style={{fontSize:13,color:"#999",fontFamily:"'Share Tech Mono',monospace",lineHeight:1.8}}>Feed combines Reuters Markets, Bloomberg Markets, Myfxbook, TradingEconomics, and live calendar events in one on-page timeline.</div>
            </div>
            {LINKS.map((lnk,i)=>(
              <div key={i} onClick={()=>window.open(lnk.url,"_blank","noopener,noreferrer")}

        <button onClick={()=>setSubOpen(false)} style={{background:"none",border:"none",color:"#bbb",fontSize:13,cursor:"pointer",letterSpacing:1}}>CLOSE</button>
      </div>
    </div>
  );

  // ── NAV ──
  const planColor=plan==="elite"?A:plan==="pro"?G:"#bbb";
  // Navigation tabs: clean compact nav.
  const NAV=[
    {id:"clock",icon:"⏱",l:"CLOCK"},
    {id:"news",icon:"📰",l:"NEWS"},
    {id:"signals",icon:"📡",l:"SIGNALS"},
    {id:"replay",icon:"📊",l:"REPLAY"}
  ];

  return(
    <div style={{minHeight:"100vh",maxWidth:480,margin:"0 auto",background:`linear-gradient(180deg,${BG} 0%,#090920 100%)`,fontFamily:"'Orbitron',monospace",color:"#fff",paddingBottom:72}}>
      <style>{`*{box-sizing:border-box;margin:0;padding:0;}body{background:${BG};}input,textarea,select{font-family:'Share Tech Mono',monospace;outline:none;}button{font-family:'Orbitron',monospace;}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#08081e}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}`}</style>

      {/* HEADER */}
      <div style={{padding:"10px 14px 9px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(240,160,48,0.16)",border:"1px solid rgba(240,160,48,0.45)",color:A,fontSize:13,fontWeight:900}}>B3</div>
          <div>
            <div style={{fontSize:13,fontWeight:900,letterSpacing:2,background:`linear-gradient(90deg,${A},#ff6600)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>BiG ENGiN3</div>
            <div style={{fontSize:13,letterSpacing:3,color:"#888",marginTop:1}}>ZONE CLOCK</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {liveZ.length>0&&<div style={{width:7,height:7,borderRadius:"50%",background:liveZ[0].type==="buy"?G:liveZ[0].type==="sell"?R:D,boxShadow:`0 0 8px ${liveZ[0].type==="buy"?G:liveZ[0].type==="sell"?R:D}`}}/>}
          <div style={{padding:"5px 14px",borderRadius:18,background:"rgba(255,149,0,0.12)",border:"1px solid rgba(255,149,0,0.45)",color:"#ff9500",fontSize:16,fontWeight:900,letterSpacing:1}}>₿</div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{animation:"fadeUp .3s ease"}}>
        {tab==="clock"    && <ClockTab/>}

      {/* NAV */}

      {tzOpen&&<TZModal/>}

    </div>
  );

function hideLoader(){
  try {
    const l = document.getElementById('loader');
    if(l){ l.style.opacity='0'; setTimeout(()=>{ l.style.display='none'; }, 250); }
  } catch(_) {}
}
function showFatal(msg){
  try {
    hideLoader();
    const root = document.getElementById('root');
    if(root && !root.dataset.errorShown){
      root.dataset.errorShown = '1';
      root.innerHTML = '<div style="min-height:100vh;background:#06071a;color:#fff;padding:20px;font-family:monospace;white-space:pre-wrap"><div style="font-weight:bold;margin-bottom:10px;color:#ff9500">BiG ENGiN3 error</div>' + String(msg || 'Unknown script error') + '</div>';
    }
  } catch(_) {}
}
window.addEventListener('error', function(e){
  showFatal((e && e.message) || 'Unknown script error');
});
window.addEventListener('unhandledrejection', function(e){
  showFatal((e && e.reason && e.reason.message) || (e && e.reason) || 'Unhandled promise rejection');
});
setTimeout(function(){
  try {
    const root = document.getElementById('root');
    if(root && !root.dataset.rendered && !root.dataset.errorShown){
      hideLoader();
      root.innerHTML = '<div style="min-height:100vh;background:#06071a;color:#fff;padding:20px;font-family:monospace"><div style="font-weight:bold;margin-bottom:10px;color:#ff9500">BiG ENGiN3 notice</div>The app took too long to start. Refresh once. If it still sticks, the page hit a startup error and this fallback prevented the endless loader.</div>';
    }
  } catch(_) {}
}, 4000);
try {
  const rootEl = document.getElementById('root');
  ReactDOM.createRoot(rootEl).render(React.createElement(App));
  if(rootEl){ rootEl.dataset.rendered = '1'; }
  hideLoader();
} catch(e){
  showFatal((e && e.message) || e);
}
</script>
</body>
</html>
